events {
  worker_connections 1024;
}

http {
  server_tokens off;
  ssl_certificate     /etc/nginx/server.crt;
  ssl_certificate_key /etc/nginx/server.key;
  ssl_verify_client off;
  ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
  ssl_protocols  TLSv1 TLSv1.1 TLSv1.2;
  ssl_session_cache  builtin:1000  shared:SSL:10m;

  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $proxy_connection;
  proxy_set_header X-Forwarded-Host $the_host;
  proxy_set_header X-Forwarded-Proto $the_scheme;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_http_version 1.1;

  client_max_body_size 1024M;

  map $http_host $this_host {
    "" $host;
    default $http_host;
  }

  map $http_x_forwarded_proto $the_scheme {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  map $http_x_forwarded_host $the_host {
    default $http_x_forwarded_host;
    "" $this_host;
  }

  map $http_upgrade $proxy_connection {
    default upgrade;
    "" close;
  }

  # Proxy for filebrowser
  server {
    listen 443 ssl;
    server_name file.rta.net;
    location / {
      proxy_pass http://filebrowser;
    }
  }

  # Proxy for onlyoffice
  server {
    listen 443 ssl;
    server_name oo.rta.net;
    location / {
      proxy_pass http://onlyoffice;
    }
  }


  # Proxy for codimd
  server {
    listen 443 ssl;
    server_name md.rta.net;

    # Allow connections only from referers in the same domain :/
    location / {
      if ($http_referer !~* (\.rta\.net)) {
        return 403;
      }
      proxy_pass http://codimd:3000;
    }

    # I didn't see a clean way around this, but allow all websocket connections regardless
    location /socket.io {
      proxy_pass http://codimd:3000;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    }
  }




}
